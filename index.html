<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map Trajectory Animation - Fetched SVG</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #map { height: 100vh; width: 100vw; }
    
    .controls {
      position: absolute; top: 10px; left: 60px; z-index: 1000;
      background: rgba(255,255,255,0.95); padding: 12px 18px;
      border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px;
      display: flex; gap: 16px; align-items: center;
    }
    .controls label { font-weight: 600; color: #333; }
    .controls input[type=range] { accent-color: #2563eb; width: 120px; }
    .controls button {
      padding: 6px 14px; border: none; border-radius: 8px;
      background: #2563eb; color: white; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .controls button:hover { background: #1d4ed8; }
    .controls button.stop { background: #dc2626; }
    .controls button.stop:hover { background: #b91c1c; }
    
    .info-panel {
      position: absolute; bottom: 20px; left: 60px; z-index: 1000;
      background: rgba(255,255,255,0.95); padding: 12px 18px;
      border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
      color: #444;
    }
    .info-panel strong { color: #111; }

    #truck-container svg {
      width: 100%;
      height: 100%;
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="controls">
    <label for="speed">Speed:</label>
    <input type="range" id="speed" min="1" max="100" value="20">
    <span id="speedValue">20</span> m/s
    <button id="playBtn" onclick="togglePlay()" disabled>⏳ Loading...</button>
    <button onclick="resetAnimation()">↺ Reset</button>
  </div>

  <div class="custom-panel" style="position: absolute; top: 70px; left: 60px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 12px 18px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; display: flex; flex-direction: column; gap: 10px; min-width: 200px;">
    <strong style="margin-bottom: 5px; color: #111;">Features & Icon Customizer</strong>
    
    <div style="display: flex; flex-direction: column; gap: 5px;">
      <label for="iconSelect" style="font-weight: 600; color: #333;">Select SVG Icon:</label>
      <select id="iconSelect" style="padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="transporteur.svg">Truck (transporteur.svg)</option>
        <option value="tracteur.svg">Tracteur (tracteur.svg)</option>
        <option value="tourisme1.svg">Tourisme1 (tourisme1.svg)</option>
        <option value="tourisme2.svg">Tourisme 2 (tourisme2.svg)</option>
        <option value="tourisme4.svg">Tourisme 4 (tourisme4.svg)</option>
         <option value="tourisme3.svg">Tourisme 3 (tourisme3.svg)</option>
        
        
      </select>
      <small style="font-size: 11px; color: #666;">Note: Must use CSS vars <code>--truck-color</code> & <code>--truck-color-light</code> for coloring</small>
    </div>

    <label style="display: flex; gap: 8px; align-items: center; cursor: pointer; border-top: 1px solid #eee; padding-top: 10px;">
      <input type="checkbox" id="autoColor" checked> Auto Color Cycle
    </label>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <label for="mainColor" style="font-weight: 600; color: #333;">Main Color:</label>
      <input type="color" id="mainColor" value="#5fdd00" style="cursor: pointer; border: none; background: none; width: 30px; height: 30px;">
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <label for="lightColor" style="font-weight: 600; color: #333;">Light Color:</label>
      <input type="color" id="lightColor" value="#5fdd00" style="cursor: pointer; border: none; background: none; width: 30px; height: 30px;">
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
      <label for="iconScale" style="font-weight: 600; color: #333;">Icon Scale: <span id="scaleValue">1.0x (40x65 px)</span></label>
      <input type="range" id="iconScale" min="0.5" max="3.0" step="0.1" value="1.0" style="accent-color: #2563eb;">
    </div>
    
    <div style="display: flex; gap: 10px; margin-top: 5px;">
      <div style="flex: 1;">
        <label for="iconWidth" style="font-weight: 600; color: #333; display: block; font-size: 12px;">Width (px)</label>
        <input type="number" id="iconWidth" value="40" min="10" max="200" style="width: 100%; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
      </div>
      <div style="flex: 1;">
        <label for="iconHeight" style="font-weight: 600; color: #333; display: block; font-size: 12px;">Height (px)</label>
        <input type="number" id="iconHeight" value="65" min="10" max="300" style="width: 100%; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
      </div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
      <label for="mapZoom" style="font-weight: 600; color: #333;">Map Zoom: <span id="zoomValue">14</span></label>
      <input type="range" id="mapZoom" min="1" max="19" step="1" value="14" style="accent-color: #dc2626;">
    </div>
  </div>

  <div class="info-panel">
    <strong>Points:</strong> <span id="totalPoints">–</span> |
    <strong>Current:</strong> <span id="currentPoint">–</span> |
    <strong>Position:</strong> <span id="currentPos">–</span>
  </div>

      attribution: 'Tiles &copy; Esri &mdash; Source: Esri'
    });

    streetView.addTo(map);

    L.control.layers({
      "Street View": streetView,
      "Satellite": satelliteView
    }).addTo(map);

    var polyline = L.polyline(trajectory, { color: '#2563eb', weight: 3, opacity: 0.7 }).addTo(map);
    if(trajectory.length > 1 && trajectory[0].length > 1) {
        map.fitBounds(polyline.getBounds(), { padding: [40, 40] });
    }

    var startIcon = L.divIcon({
      className: '',
      html: '<div style="background:#16a34a;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid white;">S</div>',
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    var endIcon = L.divIcon({
      className: '',
      html: '<div style="background:#dc2626;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid white;">E</div>',
      iconSize: [28, 28], iconAnchor: [14, 14]
    });
    
    if(trajectory.length > 0 && trajectory[0].length > 1) {
        L.marker(trajectory[0], { icon: startIcon }).addTo(map).bindPopup('Start');
        L.marker(trajectory[trajectory.length - 1], { icon: endIcon }).addTo(map).bindPopup('End');
    }

  
    var carMarker;
    var currentIdx = 0;           
    var currentProgress = 0;      
    var isPlaying = false;        
    var speed = 20;               
    var animationId = null;
    var lastFrameTime = 0;

    var currentRotation = 0; 
    var targetRotation = 0;
    var turnSpeed = 0.015; 

    document.getElementById('totalPoints').textContent = trajectory.length;
    document.getElementById('speed').addEventListener('input', function(e) {
      speed = parseInt(e.target.value);
      document.getElementById('speedValue').textContent = speed;
    });

    function loadSvgIcon(iconName) {
      fetch("./" + iconName)
        .then((res) => {
          if (!res.ok) throw new Error("SVG icon not found: " + iconName);
          return res.text();
        })
        .then((data) => {
          var startPos = (trajectory.length > 0 && trajectory[0].length > 1) ? trajectory[0] : [34.76, 10.76];
          
          let w = parseFloat(document.getElementById('iconWidth').value) || 40;
          let h = parseFloat(document.getElementById('iconHeight').value) || 65;
          let scaleX = w / 40;
          let scaleY = h / 65;
          
          let iconHtml = '<div id="truck-container" style="width: 40px; height: 65px; transform: scale(' + scaleX + ', ' + scaleY + '); transform-origin: center center;">' + data + '</div>';

          if (!carMarker) {
            // create the marker with the SVG icon
            carMarker = L.marker(startPos, {
              icon: L.divIcon({
                className: '',
                html: iconHtml,
                iconSize: [40, 65],
                iconAnchor: [20, 32.5]
              }),
              zIndexOffset: 1000
            }).addTo(map);

            if (trajectory.length >= 2 && trajectory[0].length > 1) {
              targetRotation = getBearing(trajectory[0], trajectory[1]);
              currentRotation = targetRotation;
              setCarRotation(currentRotation);
            }

            document.getElementById('playBtn').disabled = false;
            document.getElementById('playBtn').textContent = '⏸ Pause';
            isPlaying = true;
            updateInfo();
            scheduleFrame();
          } else {
            // update existing marker
            carMarker.setIcon(L.divIcon({
              className: '',
              html: iconHtml,
              iconSize: [40, 65],
              iconAnchor: [20, 32.5]
            }));
            setCarRotation(currentRotation);
          }

          // Apply current colors to the new SVG
          let svgElement = document.querySelector("#truck-container svg");
          if(svgElement) {
              let mainClr = document.getElementById('mainColor').value;
              let lightClr = document.getElementById('lightColor').value;
              svgElement.style.setProperty("--truck-color", mainClr);
              svgElement.style.setProperty("--truck-color-light", lightClr);
          }
        })
        .catch(err => {
          console.error("Problème fel chargement mta3 " + iconName, err);
          let btn = document.getElementById('playBtn');
          if (btn) btn.textContent = '❌ Error SVG';
        });
    }

    // Load initial icon
    loadSvgIcon("transporteur.svg");

    document.getElementById('iconSelect').addEventListener('change', function(e) {
      loadSvgIcon(e.target.value);
    });

    const colors = [
      ["#5fdd00", "#5fdd00"], // Vert
      ["#ffa008", "#ffa008"], // Orange
      ["#eb2214", "#eb2214"], // Rouge
      ["#f4f500", "#f4f500"], // Yellow
    ];
    let colorIndex = 1;

    function changeColor() {
      let svgElement = document.querySelector("#truck-container svg");
      if (!svgElement) return;

      colorIndex = (colorIndex + 1) % colors.length;
      const [main, light] = colors[colorIndex];

      svgElement.style.setProperty("--truck-color", main);
      svgElement.style.setProperty("--truck-color-light", light);
      
      // Update inputs to match auto-cycling
      document.getElementById('mainColor').value = main;
      document.getElementById('lightColor').value = light;
    }

    let colorInterval = setInterval(changeColor, 3000);

    // Auto Color Cycle toggle
    document.getElementById('autoColor').addEventListener('change', function(e) {
      if (e.target.checked) {
        colorInterval = setInterval(changeColor, 3000);
      } else {
        clearInterval(colorInterval);
      }
    });

    // Manual Customization properties
    document.getElementById('mainColor').addEventListener('input', function(e) {
      document.getElementById('autoColor').checked = false; // Disable auto if set manually
      clearInterval(colorInterval);
      let svgElement = document.querySelector("#truck-container svg");
      if (svgElement) svgElement.style.setProperty("--truck-color", e.target.value);
    });

    document.getElementById('lightColor').addEventListener('input', function(e) {
      document.getElementById('autoColor').checked = false; // Disable auto if set manually
      clearInterval(colorInterval);
      let svgElement = document.querySelector("#truck-container svg");
      if (svgElement) svgElement.style.setProperty("--truck-color-light", e.target.value);
    });

    // Icon Scale toggle
    document.getElementById('iconScale').addEventListener('input', function(e) {
      let val = e.target.value;
      let w = Math.round(40 * val);
      let h = Math.round(65 * val);
      document.getElementById('scaleValue').textContent = parseFloat(val).toFixed(1) + 'x (' + w + 'x' + h + ' px)';
      document.getElementById('iconWidth').value = w;
      document.getElementById('iconHeight').value = h;
      updateIconSize(w, h);
    });

    function updateIconSize(w, h) {
      let container = document.getElementById('truck-container');
      if (container) {
         let scaleX = w / 40;
         let scaleY = h / 65;
         container.style.transform = `scale(${scaleX}, ${scaleY})`;
         // In case the structure gets replaced by leaflet unexpectedly, 
         // let the parent know we want this size when redefining the icon wrapper
         container.style.transformOrigin = 'center center';
      }
    }

    document.getElementById('iconWidth').addEventListener('input', function(e) {
      let w = parseFloat(e.target.value) || 40;
      let h = parseFloat(document.getElementById('iconHeight').value) || 65;
      updateIconScaleText(w, h);
      updateIconSize(w, h);
    });

    document.getElementById('iconHeight').addEventListener('input', function(e) {
      let w = parseFloat(document.getElementById('iconWidth').value) || 40;
      let h = parseFloat(e.target.value) || 65;
      updateIconScaleText(w, h);
      updateIconSize(w, h);
    });

    function updateIconScaleText(w, h) {
       let scaleAvg = ((w / 40) + (h / 65)) / 2;
       document.getElementById('scaleValue').textContent = scaleAvg.toFixed(1) + 'x (' + w + 'x' + h + ' px)';
    }

    // Map Zoom toggle
    document.getElementById('mapZoom').addEventListener('input', function(e) {
      let val = e.target.value;
      document.getElementById('zoomValue').textContent = val;
      map.setZoom(val);
    });

    // Sync zoom input on map interaction
    map.on('zoomend', function() {
      let currentZoom = map.getZoom();
      document.getElementById('mapZoom').value = currentZoom;
      document.getElementById('zoomValue').textContent = currentZoom;
    });

    function getBearing(a, b) {
      var dLon = (b[1] - a[1]) * Math.PI / 180;
      var lat1 = a[0] * Math.PI / 180;
      var lat2 = b[0] * Math.PI / 180;
      var y = Math.sin(dLon) * Math.cos(lat2);
      var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
      var brng = Math.atan2(y, x) * 180 / Math.PI;
      return (brng + 360) % 360;   
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function setCarRotation(angleDeg) {
      var svgElement = document.querySelector("#truck-container svg");
      if (svgElement) {
        svgElement.style.transform = 'rotate(' + angleDeg.toFixed(2) + 'deg)';
      }
    }

    function getCurrentSegmentBearing() {
      if (currentIdx >= trajectory.length - 1) {
        if (trajectory.length >= 2) {
          return getBearing(trajectory[trajectory.length - 2], trajectory[trajectory.length - 1]);
        }
        return 0;
      }
      return getBearing(trajectory[currentIdx], trajectory[currentIdx + 1]);
    }

    function updateRotationToTarget(targetBearing) {
      var currentMod = ((targetRotation % 360) + 360) % 360;
      var diff = targetBearing - currentMod;
      
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;
      
      targetRotation += diff;
    }
    function updateInfo() {
      document.getElementById('currentPoint').textContent = currentIdx + ' / ' + trajectory.length;
      var lat, lon;
      if (currentIdx < trajectory.length) {
        lat = trajectory[currentIdx][0]; lon = trajectory[currentIdx][1];
      } else if (trajectory.length > 0) {
        lat = trajectory[trajectory.length - 1][0]; lon = trajectory[trajectory.length - 1][1];
      }
      if(lat && lon) document.getElementById('currentPos').textContent = lat.toFixed(6) + ', ' + lon.toFixed(6);
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      document.getElementById('playBtn').textContent = isPlaying ? '⏸ Pause' : '▶ Play';
      document.getElementById('playBtn').className = isPlaying ? '' : 'stop';
      if (isPlaying) {
          lastFrameTime = 0; 
          scheduleFrame();
      }
    }

    function resetAnimation() {
      currentIdx = 0;
      currentProgress = 0;
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ Pause';
      document.getElementById('playBtn').className = '';
      if (animationId) { cancelAnimationFrame(animationId); animationId = null; }

      if(trajectory.length > 0 && trajectory[0].length > 1 && carMarker) {
          carMarker.setLatLng(trajectory[0]);
          if (trajectory.length >= 2) {
            targetRotation = getBearing(trajectory[0], trajectory[1]);
            currentRotation = targetRotation;
          }
          setCarRotation(currentRotation);
          var svgElement = document.querySelector("#truck-container svg");
          if(svgElement) {
              svgElement.style.transition = 'none';
              setCarRotation(currentRotation);
              setTimeout(() => { 
                svgElement.style.transition = 'transform 0.2s ease-out'; 
              }, 50);
          }
      }

      updateInfo();
      lastFrameTime = 0;
      scheduleFrame();
    }
    
    function animateFrame(timestamp) {
      if (!isPlaying || !carMarker) return;

      if (!lastFrameTime) lastFrameTime = timestamp;
      var dt = timestamp - lastFrameTime;
      lastFrameTime = timestamp;
      var originalDt = dt;

      while (dt > 0 && currentIdx < trajectory.length - 1) {
        var curr = trajectory[currentIdx];
        var next = trajectory[currentIdx + 1];

        if (!curr || !next || curr.length < 2 || next.length < 2) {
            currentIdx++; continue;
        }

        var dist = map.distance(curr, next); 

        if (dist === 0) {
            currentIdx++; currentProgress = 0; continue;
        }

        var speedMetersPerSec = speed; 
        var timeToCrossMs = (dist / speedMetersPerSec) * 1000;
        var timeRemainingMs = timeToCrossMs * (1 - currentProgress);

        if (dt >= timeRemainingMs) {
            dt -= timeRemainingMs;
            currentIdx++;
            currentProgress = 0;
            updateInfo();

            if (currentIdx < trajectory.length - 1) {
                updateRotationToTarget(getCurrentSegmentBearing());
            }
        } else {
            currentProgress += dt / timeToCrossMs;
            dt = 0; 

            var lat = lerp(curr[0], next[0], currentProgress);
            var lon = lerp(curr[1], next[1], currentProgress);
            carMarker.setLatLng([lat, lon]);
        }
      }

      if (currentIdx >= trajectory.length - 1) {
        if(trajectory.length > 0) carMarker.setLatLng(trajectory[trajectory.length - 1]);
        updateInfo();
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶ Play';
        document.getElementById('playBtn').className = 'stop';
        return;
      }

     
        var rotDiff = targetRotation - currentRotation;
        currentRotation += rotDiff * (1 - Math.exp(-originalDt * turnSpeed));
        setCarRotation(currentRotation);

        animationId = requestAnimationFrame(animateFrame);
    }

    function scheduleFrame() {
      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(animateFrame);
    }

  </script>
</body>
</html>
