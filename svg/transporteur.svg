<svg id="truck" xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 408 658" width="100%" height="100%" 
     style="
       --fillColor: #146633; 
       --fillColor-light: #1b8542;
       transition: --fillColor 0.5s ease, --fillColor-light 0.5s ease;
     ">
  <defs>

  <filter id="cadre-noir" x="-25%" y="-25%" width="150%" height="150%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
    <feComponentTransfer in="blur" result="sharpened">
      <feFuncA type="linear" slope="30" intercept="-5"/>
    </feComponentTransfer>
    <feFlood flood-color="#000000" flood-opacity="1" result="pureBlack"/>
    <feComposite in="pureBlack" in2="sharpened" operator="in" result="outline"/>
    <feMerge>
      <feMergeNode in="outline"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
    <linearGradient id="boxGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="var(--fillColor)"></stop>
      <stop offset="50%" stop-color="var(--fillColor-light)"></stop>
      <stop offset="100%" stop-color="var(--fillColor)"></stop>
    </linearGradient>
    
    <linearGradient id="cabGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e8e8"></stop>
      <stop offset="15%" stop-color="#ffffff"></stop>
      <stop offset="85%" stop-color="#ffffff"></stop>
      <stop offset="100%" stop-color="#e8e8e8"></stop>
    </linearGradient>
    <linearGradient id="windshieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"></stop>
      <stop offset="60%" stop-color="#3a3a3a"></stop>
      <stop offset="100%" stop-color="#111111"></stop>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.25"></feDropShadow>
    </filter>
    <filter id="lightShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"></feDropShadow>
    </filter>
  </defs>
<g filter="url(#cadre-noir)">

  <g filter="url(#shadow)">
    <rect x="70" y="240" width="260" height="360" rx="3" fill="#cccccc" stroke="#a0a0a0" stroke-width="3"></rect>
    <rect x="76" y="246" width="248" height="348" fill="url(#boxGradient)"></rect>
    
    <rect x="68" y="238" width="12" height="12" rx="2" fill="#888888"></rect>
    <rect x="320" y="238" width="12" height="12" rx="2" fill="#888888"></rect>
    <rect x="68" y="590" width="12" height="12" rx="2" fill="#888888"></rect>
    <rect x="320" y="590" width="12" height="12" rx="2" fill="#888888"></rect>
  </g>

  <g filter="url(#lightShadow)">
    <path d="M 110 145 C 80 145 55 150 45 160 C 40 165 50 170 70 165 L 110 160 Z" fill="#222222"></path>
    <path d="M 60 155 C 55 158 52 162 55 164 C 58 165 65 161 68 158 Z" fill="#555555"></path> 
    <path d="M 290 145 C 320 145 345 150 355 160 C 360 165 350 170 330 165 L 290 160 Z" fill="#222222"></path>
    <path d="M 340 155 C 345 158 348 162 345 164 C 342 165 335 161 332 158 Z" fill="#555555"></path>
  </g>

  <g filter="url(#shadow)">
    <rect x="105" y="40" width="190" height="215" rx="45" fill="url(#cabGradient)" stroke="#dcdcdc" stroke-width="1"></rect>
    <path d="M 125 40 Q 200 25 275 40 L 285 60 Q 200 50 115 60 Z" fill="#2a2a2a"></path>
    <ellipse cx="200" cy="46" rx="8" ry="4" fill="#666666"></ellipse>
    <path d="M 115 105 C 150 85 250 85 285 105 L 295 150 C 260 160 140 160 105 150 Z" fill="url(#windshieldGrad)"></path>
    <path d="M 140 148 L 195 138" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"></path>
    <path d="M 205 148 L 260 138" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"></path>
    <path d="M 120 110 C 150 95 250 95 280 110 L 270 120 C 230 110 170 110 130 120 Z" fill="#222222" opacity="0.6"></path>
    <path d="M 106 125 Q 112 165 110 200 L 102 200 Q 100 165 102 125 Z" fill="#222222"></path>
    <path d="M 294 125 Q 288 165 290 200 L 298 200 Q 300 165 298 125 Z" fill="#222222"></path>
    <rect x="135" y="170" width="35" height="75" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"></rect>
    <rect x="230" y="170" width="35" height="75" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"></rect>
    <line x1="170" y1="165" x2="230" y2="165" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round"></line>
    <g filter="url(#lightShadow)">
      <rect x="272" y="165" width="4" height="65" rx="2" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"></rect>
      <circle cx="274" cy="168" r="3.5" fill="#333333"></circle>
    </g>
  </g>
</g>
</svg>
