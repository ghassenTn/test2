<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%" style="--fillColor: #FFD700; --fillColor-light: #EAA800; --fillColor-dark: #B8860B; transition: --fillColor 0.5s ease, --fillColor-light 0.5s ease, --fillColor-dark 0.5s ease;">
  <defs>
    <linearGradient id="yellowBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: var(--fillColor);" />
      <stop offset="50%" style="stop-color: var(--fillColor-light);" />
      <stop offset="100%" style="stop-color: var(--fillColor-dark);" />
    </linearGradient>
    
    <linearGradient id="metalCylinder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EEEEEE" />
      <stop offset="50%" stop-color="#AAAAAA" />
      <stop offset="100%" stop-color="#555555" />
    </linearGradient>

    <linearGradient id="metalPlate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#333333" />
      <stop offset="20%" stop-color="#555555" />
      <stop offset="80%" stop-color="#444444" />
      <stop offset="100%" stop-color="#222222" />
    </linearGradient>

    <linearGradient id="bucketDepth" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A" />
      <stop offset="60%" stop-color="#151515" />
      <stop offset="100%" stop-color="#2A2A2A" />
    </linearGradient>

    <linearGradient id="pinMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCCCCC" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#888888" />
    </linearGradient>

    <linearGradient id="tireBulge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="30%" stop-color="#282828" />
      <stop offset="70%" stop-color="#282828" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <filter id="drop-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="8" dy="12" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <filter id="light-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <filter id="inner-shadow">
      <feOffset dx="10" dy="0"/>
      <feGaussianBlur stdDeviation="10" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.8" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <g id="bolt">
      <circle cx="0" cy="0" r="4" fill="#111" />
      <circle cx="0" cy="0" r="2.5" fill="url(#pinMetal)" />
    </g>

    <g id="tooth">
      <rect x="0" y="-12" width="40" height="24" rx="3" fill="#222" />
      <use href="#bolt" x="10" y="-6" />
      <use href="#bolt" x="10" y="6" />
      <path d="M 0,-10 L -35,-6 L -40,-2 L -40,2 L -35,6 L 0,10 Z" fill="#151515" stroke="#333" stroke-width="1"/>
      <line x1="-5" y1="0" x2="-30" y2="0" stroke="#333" stroke-width="2"/>
    </g>

    <g id="frontTire">
      <rect x="0" y="0" width="90" height="60" rx="10" fill="url(#tireBulge)" filter="url(#drop-shadow)"/>
      <g stroke="#0A0A0A" stroke-width="6" stroke-linecap="round">
        <line x1="12" y1="2" x2="22" y2="28" /> <line x1="12" y1="58" x2="22" y2="32" />
        <line x1="28" y1="2" x2="38" y2="28" /> <line x1="28" y1="58" x2="38" y2="32" />
        <line x1="44" y1="2" x2="54" y2="28" /> <line x1="44" y1="58" x2="54" y2="32" />
        <line x1="60" y1="2" x2="70" y2="28" /> <line x1="60" y1="58" x2="70" y2="32" />
        <line x1="76" y1="2" x2="86" y2="28" /> <line x1="76" y1="58" x2="86" y2="32" />
      </g>
      <rect x="0" y="0" width="90" height="60" rx="10" fill="none" stroke="#000000" stroke-width="2"/>
    </g>

    <g id="rearTire">
      <rect x="0" y="0" width="130" height="85" rx="12" fill="url(#tireBulge)" filter="url(#drop-shadow)"/>
      <g stroke="#0A0A0A" stroke-width="8" stroke-linecap="round">
        <line x1="15" y1="3" x2="30" y2="40" /> <line x1="15" y1="82" x2="30" y2="45" />
        <line x1="35" y1="3" x2="50" y2="40" /> <line x1="35" y1="82" x2="50" y2="45" />
        <line x1="55" y1="3" x2="70" y2="40" /> <line x1="55" y1="82" x2="70" y2="45" />
        <line x1="75" y1="3" x2="90" y2="40" /> <line x1="75" y1="82" x2="90" y2="45" />
        <line x1="95" y1="3" x2="110" y2="40" /> <line x1="95" y1="82" x2="110" y2="45" />
        <line x1="115" y1="3" x2="130" y2="40" /> <line x1="115" y1="82" x2="130" y2="45" />
      </g>
      <rect x="0" y="0" width="130" height="85" rx="12" fill="none" stroke="#000000" stroke-width="2"/>
    </g>
  </defs>

  <g id="tractopelle" transform="translate(600, 0) rotate(90)">
    <rect x="270" y="225" width="24" height="25" fill="#151515" /> 
    <rect x="270" y="350" width="24" height="25" fill="#151515" /> 
    <rect x="460" y="200" width="30" height="35" fill="#151515" /> 
    <rect x="460" y="365" width="30" height="35" fill="#151515" /> 

    <use href="#frontTire" x="240" y="170" />
    <use href="#frontTire" x="240" y="370" />
    <use href="#rearTire" x="410" y="130" />
    <use href="#rearTire" x="410" y="385" />

    <path d="M 380,165 L 480,165 C 500,165 500,235 500,235 L 380,235 Z" fill="#1A1A1A" filter="url(#drop-shadow)"/>
    <path d="M 380,435 L 480,435 C 500,435 500,365 500,365 L 380,365 Z" fill="#1A1A1A" filter="url(#drop-shadow)"/>

    <rect x="180" y="245" width="170" height="110" rx="10" fill="url(#yellowBody)" filter="url(#drop-shadow)"/>
    <rect x="185" y="255" width="25" height="90" rx="3" fill="#111111" /> 
    <g fill="#222">
      <rect x="230" y="250" width="80" height="5" />
      <rect x="230" y="260" width="80" height="5" />
      <rect x="230" y="270" width="80" height="5" />
      <rect x="230" y="325" width="80" height="5" />
      <rect x="230" y="335" width="80" height="5" />
      <rect x="230" y="345" width="80" height="5" />
    </g>
    <path d="M 275,260 L 285,260 L 285,240 L 270,235 L 275,260 Z" fill="#222" filter="url(#light-shadow)"/>
    <circle cx="280" cy="260" r="10" fill="#333" />
    <circle cx="280" cy="260" r="4" fill="#000"/>

    <rect x="345" y="225" width="130" height="150" rx="12" fill="url(#yellowBody)" filter="url(#drop-shadow)"/>      <g transform="translate(100, 300) scale(1.3) translate(-100, -300)">



    <rect x="80" y="160" width="55" height="280" rx="6" fill="url(#metalPlate)" filter="url(#drop-shadow)"/>
    
    <rect x="95" y="165" width="40" height="270" rx="4" fill="url(#bucketDepth)" filter="url(#inner-shadow)"/>
    
    <rect x="70" y="160" width="15" height="280" rx="4" fill="#333" />
    <rect x="75" y="160" width="10" height="280" fill="#222" />
    
    <g id="bucketBolts">
      <use href="#bolt" x="80" y="172.5" />
      <use href="#bolt" x="80" y="202.5" />
      <use href="#bolt" x="80" y="232.5" />
      <use href="#bolt" x="80" y="262.5" />
      <use href="#bolt" x="80" y="292.5" />
      <use href="#bolt" x="80" y="322.5" />
      <use href="#bolt" x="80" y="352.5" />
      <use href="#bolt" x="80" y="382.5" />
      <use href="#bolt" x="80" y="412.5" />
    </g>
    
    <g id="frontTeeth" fill="#111" transform="translate(75, 0) scale(0.375, 1)">
      <use href="#tooth" x="0" y="170" />
      <use href="#tooth" x="0" y="200" />
      <use href="#tooth" x="0" y="230" />
      <use href="#tooth" x="0" y="260" />
      <use href="#tooth" x="0" y="290" />
      <use href="#tooth" x="0" y="320" />
      <use href="#tooth" x="0" y="350" />
      <use href="#tooth" x="0" y="380" />
      <use href="#tooth" x="0" y="410" />
    </g>

    <rect x="130" y="165" width="10" height="270" fill="#1A1A1A" />
    <g fill="#050505">
      <circle cx="135" cy="180" r="3" /> <circle cx="135" cy="210" r="3" />
      <circle cx="135" cy="240" r="3" /> <circle cx="135" cy="270" r="3" />
      <circle cx="135" cy="300" r="3" /> <circle cx="135" cy="330" r="3" />
      <circle cx="135" cy="360" r="3" /> <circle cx="135" cy="390" r="3" />
      <circle cx="135" cy="420" r="3" />
    </g>
    
      </g>
      <path d="M 350,235 L 125,180 L 125,220 L 350,265 Z" fill="url(#yellowBody)" filter="url(#light-shadow)"/>
    <path d="M 350,365 L 125,420 L 125,380 L 350,335 Z" fill="url(#yellowBody)" filter="url(#light-shadow)"/>
    
    <rect x="180" y="210" width="110" height="16" transform="rotate(22 180 210)" fill="#222" rx="4"/>
    <rect x="130" y="201" width="80" height="8" transform="rotate(22 130 201)" fill="url(#metalCylinder)"/>
    <rect x="180" y="375" width="110" height="16" transform="rotate(-22 180 375)" fill="#222" rx="4"/>
    <rect x="130" y="392" width="80" height="8" transform="rotate(-22 130 392)" fill="url(#metalCylinder)"/>
    <rect x="470" y="230" width="55" height="140" rx="6" fill="#151515" filter="url(#drop-shadow)"/>
    <rect x="480" y="240" width="35" height="120" rx="4" fill="#2C2C2C"/>

    
    <circle cx="740" cy="300" r="18" fill="#111"/>
    <circle cx="740" cy="300" r="8" fill="#444"/>

    <path d="M 740,290 L 890,294 L 890,306 L 740,310 Z" fill="url(#yellowBody)" filter="url(#drop-shadow)"/>
    <path d="M 740,285 Q 800,285 850,294" fill="none" stroke="#111" stroke-width="3"/>
    <line x1="760" y1="300" x2="830" y2="300" stroke="#111" stroke-width="12" stroke-linecap="round"/>
    <line x1="830" y1="300" x2="870" y2="300" stroke="url(#metalCylinder)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="890" cy="300" r="12" fill="#111"/>
    <circle cx="890" cy="300" r="5" fill="#444"/>

    <path d="M 890,270 L 950,260 L 965,300 L 950,340 L 890,330 Z" fill="#222" filter="url(#drop-shadow)"/>
    <path d="M 900,275 L 945,268 L 955,300 L 945,332 L 900,325 Z" fill="#151515"/>
    <path d="M 950,260 L 970,265 L 953,275 Z" fill="#111"/>
    <path d="M 956,280 L 975,285 L 960,295 Z" fill="#111"/>
    <path d="M 962,300 L 980,305 L 962,315 Z" fill="#111"/>
    <path d="M 956,320 L 975,325 L 953,335 Z" fill="#111"/>

    <rect x="400" y="275" width="35" height="50" rx="5" fill="#111"/>
    <path d="M 380,285 A 15 15 0 1 0 380,315" fill="none" stroke="#000" stroke-width="4"/>
    <line x1="380" y1="300" x2="400" y2="300" stroke="#111" stroke-width="6"/>
    
    <polygon points="350,235 465,245 465,355 350,365" fill="#4A90E2" opacity="0.4"/>
    <polygon points="355,245 410,250 370,355 355,355" fill="#FFFFFF" opacity="0.2"/>
    <polygon points="350,235 465,245 465,355 350,365" fill="none" stroke="#111" stroke-width="4"/>

    <rect x="360" y="245" width="95" height="110" rx="10" fill="#222" filter="url(#drop-shadow)"/>
    <rect x="370" y="255" width="75" height="90" rx="5" fill="#333"/>
    
    <circle cx="365" cy="260" r="5" fill="#FFF" filter="url(#light-shadow)"/>
    <circle cx="365" cy="340" r="5" fill="#FFF" filter="url(#light-shadow)"/>
    <circle cx="445" cy="260" r="5" fill="#FF3333"/>
    <circle cx="445" cy="340" r="5" fill="#FF3333"/>
    
    <rect x="402" y="292" width="16" height="16" rx="8" fill="#FF8C00" filter="url(#light-shadow)"/>
    <circle cx="410" cy="300" r="5" style="fill: var(--fillColor);"/>
    <circle cx="406" cy="296" r="2" fill="#FFF" opacity="0.6"/>
  </g>
</svg>
